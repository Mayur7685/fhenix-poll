<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" font-family="'Courier New', monospace">
  <!-- Background -->
  <rect width="1200" height="1100" fill="#0f0f0f"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#888" font-size="20" font-weight="bold">FhenixPoll.sol</text>

  <!-- Actor boxes -->
  <!-- Creator -->
  <rect x="30" y="60" width="120" height="36" rx="8" fill="#1a4a6b"/>
  <text x="90" y="83" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="bold">Creator</text>

  <!-- Voter -->
  <rect x="220" y="60" width="120" height="36" rx="8" fill="#14532d"/>
  <text x="280" y="83" text-anchor="middle" fill="#86efac" font-size="13" font-weight="bold">Voter</text>

  <!-- Verifier -->
  <rect x="420" y="60" width="120" height="36" rx="8" fill="#451a03"/>
  <text x="480" y="83" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="bold">Verifier</text>

  <!-- FhenixPoll.sol -->
  <rect x="630" y="60" width="160" height="36" rx="8" fill="#3b0764"/>
  <text x="710" y="83" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="bold">FhenixPoll.sol</text>

  <!-- Threshold Network -->
  <rect x="1010" y="60" width="160" height="36" rx="8" fill="#431407"/>
  <text x="1090" y="83" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">Threshold Network</text>

  <!-- Lifelines -->
  <line x1="90" y1="96" x2="90" y2="1080" stroke="#1a4a6b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="280" y1="96" x2="280" y2="1080" stroke="#14532d" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="480" y1="96" x2="480" y2="1080" stroke="#451a03" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="710" y1="96" x2="710" y2="1080" stroke="#3b0764" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="1090" y1="96" x2="1090" y2="1080" stroke="#431407" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ── COMMUNITY ── -->
  <!-- registerCommunity -->
  <line x1="90" y1="140" x2="700" y2="140" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="390" y="133" text-anchor="middle" fill="#7dd3fc" font-size="11">registerCommunity()</text>
  <rect x="580" y="148" width="260" height="24" rx="4" fill="#1e293b"/>
  <text x="710" y="164" text-anchor="middle" fill="#94a3b8" font-size="10">community + rules stored on-chain</text>

  <!-- ── CREDENTIAL ── -->
  <!-- connect wallet / OAuth -->
  <line x1="280" y1="200" x2="470" y2="200" stroke="#fdba74" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="375" y="193" text-anchor="middle" fill="#fdba74" font-size="11">connect wallet / OAuth</text>

  <!-- check requirements (verifier box) -->
  <rect x="390" y="210" width="180" height="24" rx="4" fill="#292524"/>
  <text x="480" y="226" text-anchor="middle" fill="#fdba74" font-size="10">check requirements</text>

  <!-- EIP-712 attestation back -->
  <line x1="470" y1="252" x2="290" y2="252" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <text x="375" y="245" text-anchor="middle" fill="#fdba74" font-size="11">EIP-712 attestation</text>

  <!-- issueCredential -->
  <line x1="280" y1="278" x2="700" y2="278" stroke="#86efac" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="490" y="271" text-anchor="middle" fill="#86efac" font-size="11">issueCredential(attestation)</text>
  <rect x="580" y="286" width="260" height="24" rx="4" fill="#1e293b"/>
  <text x="710" y="302" text-anchor="middle" fill="#94a3b8" font-size="10">credential + voting weight stored</text>

  <!-- ── POLL CREATION ── -->
  <!-- createPoll / createHierarchicalPoll -->
  <line x1="90" y1="340" x2="700" y2="340" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="390" y="333" text-anchor="middle" fill="#7dd3fc" font-size="11">createPoll() / createHierarchicalPoll()</text>
  <rect x="580" y="348" width="260" height="24" rx="4" fill="#1e293b"/>
  <text x="710" y="364" text-anchor="middle" fill="#94a3b8" font-size="10">FHE tally slots + option tree on-chain</text>

  <!-- ── VOTING ── -->
  <!-- castVote -->
  <line x1="280" y1="410" x2="700" y2="410" stroke="#86efac" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="490" y="403" text-anchor="middle" fill="#86efac" font-size="11">castVote(FHE-encrypted weights)</text>
  <rect x="560" y="418" width="300" height="36" rx="4" fill="#1e293b"/>
  <text x="710" y="432" text-anchor="middle" fill="#94a3b8" font-size="10">tally updated homomorphically</text>
  <text x="710" y="447" text-anchor="middle" fill="#94a3b8" font-size="10">plaintext never exposed</text>

  <!-- poll closes -->
  <rect x="560" y="472" width="300" height="24" rx="4" fill="#7f1d1d"/>
  <text x="710" y="488" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">poll closes (endBlock + 2 passed)</text>

  <!-- ── TALLY REVEAL ── -->
  <!-- requestTallyReveal -->
  <line x1="480" y1="520" x2="700" y2="520" stroke="#fdba74" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="590" y="513" text-anchor="middle" fill="#fdba74" font-size="11">requestTallyReveal()</text>
  <rect x="560" y="528" width="300" height="36" rx="4" fill="#1e293b"/>
  <text x="710" y="542" text-anchor="middle" fill="#94a3b8" font-size="10">FHE.allowPublic per option</text>
  <text x="710" y="557" text-anchor="middle" fill="#86efac" font-size="9">✓ no FHE.decrypt (new pattern)</text>

  <!-- decryptForTx -->
  <line x1="480" y1="590" x2="1080" y2="590" stroke="#fdba74" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="780" y="583" text-anchor="middle" fill="#fdba74" font-size="11">decryptForTx(ctHash) per option</text>

  <!-- plaintext + signature back -->
  <line x1="1080" y1="616" x2="490" y2="616" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <text x="780" y="609" text-anchor="middle" fill="#fca5a5" font-size="11">plaintext + signature</text>

  <!-- publishTallyResult -->
  <line x1="480" y1="648" x2="700" y2="648" stroke="#fdba74" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="590" y="641" text-anchor="middle" fill="#fdba74" font-size="11">publishTallyResult(plaintext, sig)</text>
  <rect x="560" y="656" width="300" height="36" rx="4" fill="#1e293b"/>
  <text x="710" y="670" text-anchor="middle" fill="#94a3b8" font-size="10">sig verified on-chain</text>
  <text x="710" y="685" text-anchor="middle" fill="#94a3b8" font-size="10">plaintext → revealedTallies + rolledUpTallies</text>

  <!-- read revealedTallies -->
  <line x1="280" y1="720" x2="700" y2="720" stroke="#86efac" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="490" y="713" text-anchor="middle" fill="#86efac" font-size="11">read revealedTallies / rolledUpTallies</text>
  <rect x="100" y="728" width="220" height="24" rx="4" fill="#14532d"/>
  <text x="210" y="744" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">trustless result verification</text>

  <!-- ── WAVE 4: POSTS ── -->
  <text x="600" y="790" text-anchor="middle" fill="#555" font-size="11">── Wave 4 ──</text>

  <!-- createPost -->
  <line x1="280" y1="810" x2="700" y2="810" stroke="#86efac" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="490" y="803" text-anchor="middle" fill="#86efac" font-size="11">createPost(postId, communityId, contentHash)</text>
  <rect x="560" y="818" width="300" height="24" rx="4" fill="#1e293b"/>
  <text x="710" y="834" text-anchor="middle" fill="#94a3b8" font-size="10">keccak256(IPFS CID) stored on-chain</text>

  <!-- ── WAVE 4: QUESTS ── -->
  <!-- createQuest -->
  <line x1="90" y1="878" x2="700" y2="878" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="390" y="871" text-anchor="middle" fill="#7dd3fc" font-size="11">createQuest(target, rewardHash)</text>

  <!-- recordQuestProgress -->
  <line x1="480" y1="910" x2="700" y2="910" stroke="#fdba74" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="590" y="903" text-anchor="middle" fill="#fdba74" font-size="11">recordQuestProgress(FHE-encrypted +1)</text>
  <rect x="560" y="918" width="300" height="24" rx="4" fill="#1e293b"/>
  <text x="710" y="934" text-anchor="middle" fill="#94a3b8" font-size="10">progress accumulated under FHE</text>

  <!-- publishProgressResult -->
  <line x1="480" y1="970" x2="1080" y2="970" stroke="#fdba74" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="780" y="963" text-anchor="middle" fill="#fdba74" font-size="11">requestProgressReveal + decryptForTx</text>
  <line x1="1080" y1="990" x2="490" y2="990" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <text x="780" y="1007" text-anchor="middle" fill="#fca5a5" font-size="11">plaintext + signature → publishProgressResult</text>
  <rect x="560" y="1015" width="300" height="24" rx="4" fill="#1e293b"/>
  <text x="710" y="1031" text-anchor="middle" fill="#94a3b8" font-size="10">questCompleted = true if progress ≥ target</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#86efac"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fdba74"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fca5a5"/>
    </marker>
  </defs>
</svg>
